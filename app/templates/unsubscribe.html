{% extends "base.html" %}

{% block title %} Unsubscribe {% endblock title %}

{% block body %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-lg rounded-4 p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-envelope-open-text fa-3x text-secondary mb-3"></i>
                    <h2 class="fw-bold">Unsubscribe</h2>
                    <p class="text-muted">We're sorry to see you go.</p>
                </div>

                {% if success %}
                <div class="alert alert-success text-center">
                    <i class="fas fa-check-circle me-2"></i>
                    You have been successfully unsubscribed.
                </div>
                <div class="text-center mt-4">
                    <a href="/" class="btn btn-primary rounded-pill px-4">Return Home</a>
                </div>
                {% else %}
                <form method="POST" action="{{ url_for('subscribe.unsubscribe') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-4">
                        <label for="email" class="form-label fw-semibold">Email Address</label>
                        <input type="email" class="form-control form-control-lg bg-light border-0" id="email"
                            name="email" value="{{ email }}" required placeholder="Enter your email">
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger rounded-pill py-3">
                            Confirm Unsubscribe
                        </button>
                        <a href="/" class="btn btn-outline-secondary rounded-pill py-3">Cancel</a>
                    </div>
                </form>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock body %}
